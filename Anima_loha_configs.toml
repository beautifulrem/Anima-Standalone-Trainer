# Anima LoHa Training Configuration

[model_arguments]
dit_path = "/path/to/anima-preview.safetensors"
qwen3_path = "/path/to/qwen_3_06b_base.safetensors"
vae_path = "/path/to/qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "/path/to/dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs = true
# train_data_dir is not needed when using dataset_config


[training_arguments]
output_dir = "./output/my_anima_loha"
output_name = "my_anima_loha"
save_model_as = "safetensors"
max_train_epochs = 20
save_every_n_epochs = 1
logging_dir = "./output/my_anima_loha/logs"
log_with = "tensorboard"
learning_rate = 5e-5
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 100
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42022

#[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0

[sample_arguments]
sample_prompts = "./sample_prompts.txt"
sample_every_n_epochs = 1

[network_arguments]
network_module = "networks.loha"
network_dim = 16
network_alpha = 16
network_train_unet_only = true

# network_args: free-form "key=value" strings for networks.loha.create_network.
#
# Surfaced as dedicated UI fields (also settable here):
#   mod_dim=N                       rank for adaln_modulation_* (excluded by default; set to opt in)
#   rank_dropout=N                  drop ranks each forward, 0..1 (default off)
#   module_dropout=N                drop whole modules each forward, 0..1 (default off)
#   use_tucker=true|false           Tucker-decompose Conv2d 3x3 (default false; Anima DiT is all Linear)
#
# TOML-only (or the UI's free-form Network Args textbox):
#   conv_dim=N, conv_alpha=N        Conv2d 3x3 targeting (off by default)
#   self_attn_dim=N, cross_attn_dim=N, mlp_dim=N, llm_adapter_dim=N
#                                   per-type rank overrides (omit = network_dim; 0 = exclude that family)
#   train_llm_adapter=true          include LLMAdapterTransformerBlock targets (default false)
#   emb_dims=4,4,4                  ranks for [x_embedder, t_embedder, final_layer]
#   train_block_indices=0-7         selective per-block training: "all" / "none" / "0,2,5-7"
#   network_reg_dims="pat=N,..."    regex on dotted module name → per-pattern dim override
#   network_reg_lrs="pat=lr,..."    regex on dotted module name → per-pattern LR
#   loraplus_lr_ratio=N             LoRA+ unified up/down ratio
#   loraplus_unet_lr_ratio=N        ...or split per side:
#   loraplus_text_encoder_lr_ratio=N
#
# Full reference: networks/loha.py:create_network
network_args = [ "mod_dim=4" ]

# To initialize from a LoHa checkpoint:
# network_weights = "/path/to/loha.safetensors"

# To resume training state from a saved state folder:
# resume = "/path/to/saved_state_folder"
