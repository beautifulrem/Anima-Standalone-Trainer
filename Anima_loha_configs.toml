# Anima LoHa Training Configuration
# Mirrors Anima_lora_configs.toml; only [network_arguments] is LoHa-specific.

[model_arguments]
dit_path = "/path/to/anima-preview.safetensors"
qwen3_path = "/path/to/qwen_3_06b_base.safetensors"
vae_path = "/path/to/qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "/path/to/dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs = true
# train_data_dir is not needed when using dataset_config


[training_arguments]
output_dir = "./output/my_anima_loha"
output_name = "my_anima_loha"
save_model_as = "safetensors"
max_train_epochs = 20
save_every_n_epochs = 1
logging_dir = "./output/my_anima_loha/logs"
log_with = "tensorboard"
learning_rate = 5e-5
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 100
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42022

#[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0

[sample_arguments]
sample_prompts = "./sample_prompts.txt"
sample_every_n_epochs = 1

[network_arguments]
network_module = "networks.loha"
network_dim = 16
network_alpha = 16
network_train_unet_only = true

# network_args — free-form "key=value" strings passed to networks.loha.create_network.
# The Web UI's "Network Args" textbox accepts the same set, space-separated.
# Every kwarg below is optional; omit for the listed default.
#
# Regularization
#   use_tucker=true|false      Tucker-decompose Conv2d 3x3 (default false)
#   rank_dropout=0.1           drop ranks each forward, 0..1 (default off)
#   module_dropout=0.1         drop whole modules each forward, 0..1 (default off)
#
# Conv2d 3x3 targeting (off by default — Anima DiT is all Linear)
#   conv_dim=N                 rank for Conv2d 3x3 layers
#   conv_alpha=N               alpha for Conv2d 3x3 (defaults to 1.0 when conv_dim set)
#
# Anima per-type rank overrides (None = use network_dim, 0 = exclude that family)
#   self_attn_dim=N            rank for self_attn Linears
#   cross_attn_dim=N           rank for cross_attn Linears
#   mlp_dim=N                  rank for MLP layers
#   mod_dim=N                  rank for adaln_modulation_* (excluded by default; set to opt in)
#   llm_adapter_dim=N          rank for LLMAdapterTransformerBlock (also requires train_llm_adapter=true)
#   train_llm_adapter=true     include the LLM adapter targets (default false)
#   emb_dims=4,4,4             ranks for [x_embedder, t_embedder, final_layer] (single string, 3 ints)
#   train_block_indices=0-7    selective per-block training: "all" / "none" / "0,2,5-7"
#
# Regex overrides on module dotted name (e.g. blocks.0.self_attn.q_proj)
#   network_reg_dims="blocks\\.0\\..*=32,blocks\\.\\d+\\.mlp.*=8"
#   network_reg_lrs="blocks\\.0\\..*=1e-4"
#
# LoRA+ split learning rate
#   loraplus_lr_ratio=16                          unified up/down ratio, or split:
#   loraplus_unet_lr_ratio=16
#   loraplus_text_encoder_lr_ratio=16
#
# Suggested presets (uncomment one):
#   network_args = []                                                       # baseline: attn + MLP only
#   network_args = [ "mod_dim=4" ]                                          # + AdaLN modulation (better identity capture)
#   network_args = [ "mod_dim=4", "rank_dropout=0.1", "module_dropout=0.1" ] # above + regularization
#   network_args = [ "train_llm_adapter=true", "llm_adapter_dim=4" ]        # also adapt the LLM adapter
network_args = [ ]

# To initialize from a LoHa checkpoint (start new training with these weights):
# network_weights = "/path/to/loha.safetensors"

# To resume training state (start from a saved state folder):
# resume = "/path/to/saved_state_folder"
