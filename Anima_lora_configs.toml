# Anima Training Configuration (LoRA / LoHa / LoKr)

[model_arguments]
dit_path = "/path/to/anima-preview.safetensors"
qwen3_path = "/path/to/qwen_3_06b_base.safetensors"
vae_path = "/path/to/qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "/path/to/dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs = true


[training_arguments]
output_dir = "./output/my_anima_lora"
output_name = "my_anima_lora"
save_model_as = "safetensors"
max_train_epochs = 20
save_every_n_epochs = 1
logging_dir = "./output/my_anima_lora/logs"
log_with = "tensorboard"
learning_rate = 5e-5
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 100
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42022

#[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0

[sample_arguments]
sample_prompts = "./sample_prompts.txt"
sample_every_n_epochs = 1

[network_arguments]
# Pick one network module:
network_module = "networks.lora_anima"
# network_module = "networks.loha"
# network_module = "networks.lokr"

network_dim = 16
network_alpha = 16
network_train_unet_only = true

# Suggested network_args per module:
#   LoRA:  network_args = [ ]
#   LoHa:  network_args = [ "mod_dim=4" ]
#   LoKr:  network_args = [ "factor=-1", "mod_dim=4" ]
#
# Full kwarg reference: networks/{lora_anima,loha,lokr}.py:create_network
# UI dedicated fields: Factor (LoKr only), Mod Dim, Rank Dropout, Module Dropout, Use Tucker.

# network_weights = "/path/to/lora.safetensors"   # initialize from a saved network
# resume = "/path/to/saved_state_folder"          # resume training state
