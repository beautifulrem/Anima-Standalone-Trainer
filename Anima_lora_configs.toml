# Anima LoRA Training Configuration

[model_arguments]
dit_path = "C:\\Anima\\split_files\\diffusion_models\\anima-preview.safetensors"
qwen3_path = "C:\\Anima\\split_files\\text_encoders\\qwen_3_06b_base.safetensors"
vae_path = "C:\\Anima\\split_files\\vae\\qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "c:\\sd-scripts\\dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs = true
# train_data_dir is not needed when using dataset_config


[training_arguments]
output_dir = "C:\\output\\lora_testing_aemeath"
output_name = "my_anima_lora"
save_model_as = "safetensors"
max_train_epochs = 20
save_every_n_epochs = 1
logging_dir = "C:\\output\\lora_testing_aemeath\\logs"
log_with = "tensorboard"
learning_rate = 5e-5
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 100
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42022

#[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0

[sample_arguments]
sample_prompts = "c:\\sd-scripts\\sample_prompts.txt"
sample_every_n_epochs = 1

[network_arguments]
network_module = "networks.lora_anima"
network_dim = 16
network_alpha = 16
network_train_unet_only = true

# To initialize from a LoRA checkpoint (start new training with these weights):
# network_weights = "path\\to\\lora.safetensors"

# To resume training state (start from a saved state folder):
# resume = "path\\to\\saved_state_folder"

