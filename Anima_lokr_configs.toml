# Anima LoKr Training Configuration

[model_arguments]
dit_path = "/path/to/anima-preview.safetensors"
qwen3_path = "/path/to/qwen_3_06b_base.safetensors"
vae_path = "/path/to/qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "/path/to/dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs = true
# train_data_dir is not needed when using dataset_config


[training_arguments]
output_dir = "./output/my_anima_lokr"
output_name = "my_anima_lokr"
save_model_as = "safetensors"
max_train_epochs = 20
save_every_n_epochs = 1
logging_dir = "./output/my_anima_lokr/logs"
log_with = "tensorboard"
learning_rate = 5e-5
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 100
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42022

[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0

[sample_arguments]
sample_prompts = "./sample_prompts.txt"
sample_every_n_epochs = 1

[network_arguments]
network_module = "networks.lokr"
network_dim = 16
network_alpha = 16
network_train_unet_only = true

# LoKr-specific kwargs (free-form key=value strings; see networks/lokr.py:create_network):
#   factor=N                    Kronecker factor; -1 = auto factorize for balance (default -1)
#   use_tucker=true|false       Tucker decomposition for Conv2d 3x3+ (default false)
#   conv_dim=N                  rank for Conv2d 3x3 layers (default off)
#   conv_alpha=N                alpha for Conv2d 3x3 layers
#   rank_dropout=0.1            drop ranks during forward
#   module_dropout=0.1          drop whole modules during forward
#   train_llm_adapter=True      include LLMAdapterTransformerBlock targets
#   self_attn_dim=N             per-type dim override (also cross_attn_dim, mlp_dim, mod_dim, llm_adapter_dim)
#   emb_dims=4,4,4              ranks for x_embedder, t_embedder, final_layer (single comma-separated string)
#   train_block_indices=0-15    selective per-block training ("all", "none", "0,2,5-7")
network_args = [ "factor=-1", "use_tucker=false" ]

# To initialize from a LoKr checkpoint (start new training with these weights):
# network_weights = "/path/to/lokr.safetensors"

# To resume training state (start from a saved state folder):
# resume = "/path/to/saved_state_folder"
