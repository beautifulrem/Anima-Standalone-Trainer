# Anima LoKr Training Configuration

[model_arguments]
dit_path = "/path/to/anima-preview.safetensors"
qwen3_path = "/path/to/qwen_3_06b_base.safetensors"
vae_path = "/path/to/qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "/path/to/dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs = true
# train_data_dir is not needed when using dataset_config


[training_arguments]
output_dir = "./output/my_anima_lokr"
output_name = "my_anima_lokr"
save_model_as = "safetensors"
max_train_epochs = 20
save_every_n_epochs = 1
logging_dir = "./output/my_anima_lokr/logs"
log_with = "tensorboard"
learning_rate = 5e-5
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
lr_scheduler = "cosine"
lr_warmup_steps = 100
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42022

#[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0

[sample_arguments]
sample_prompts = "./sample_prompts.txt"
sample_every_n_epochs = 1

[network_arguments]
network_module = "networks.lokr"
network_dim = 16
network_alpha = 16
network_train_unet_only = true

# network_args: free-form "key=value" strings for networks.lokr.create_network.
# The Web UI exposes Factor, Mod Dim, Rank Dropout, Module Dropout, and Use Tucker
# as dedicated fields; long-tail kwargs (per-type dims, train_block_indices, emb_dims,
# network_reg_dims/lrs, loraplus_*, conv_dim, train_llm_adapter) only go here or in
# the UI's free-form Network Args textbox. Full reference: networks/lokr.py.
# `factor=-1` auto-factorizes for balance (recommended); set a positive int (e.g. 8 or
# 16) to compress large layers more aggressively.
network_args = [ "factor=-1", "mod_dim=4" ]

# To initialize from a LoKr checkpoint:
# network_weights = "/path/to/lokr.safetensors"

# To resume training state from a saved state folder:
# resume = "/path/to/saved_state_folder"
